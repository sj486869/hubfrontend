server {
    listen 80;
    server_name shopwithsuman.in www.shopwithsuman.in api.shopwithsuman.in;

    # Max upload size (important for large videos)
    client_max_body_size 2G;

    # 1. API Backend (FastAPI)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Security & Timeout headers
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
    }

    # 2. Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve uploads directly via Nginx for better performance
    location /media/ {
        alias /home/ubuntu/hubfrontend/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        
        # HLS specific types and performance
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        sendfile on;
        tcp_nopush on;

        # Allow Cross-Origin Requests (CORS)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Range';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Error logging
    error_log /var/log/nginx/vibestream_error.log;
    access_log /var/log/nginx/vibestream_access.log;
}
